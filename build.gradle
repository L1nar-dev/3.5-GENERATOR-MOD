plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven { url 'https://maven.fabricmc.net/' }
    maven { url 'https://maven.blamejared.com' }
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
    
    // Репозиторий Modrinth (только для группы maven.modrinth)
    maven {
        url 'https://api.modrinth.com/maven'
        content {
            includeGroup "maven.modrinth"
        }
    }
    
    // Репозиторий LuckPerms (СТРОГО только для самого LuckPerms)
    maven { 
        url 'https://repo.luckperms.net/maven' 
        content {
            includeGroup "net.luckperms"
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc.yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc.fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Cold Sweat - optional dependency
    modCompileOnly("maven.modrinth:cold-sweat:${project.cold_sweat_version}") {
        transitive = false
    }

    // LuckPerms - optional dependency
    modCompileOnly "net.luckperms:api:${project.luckperms_version}"
}

processResources {
    inputs.property 'version', project.version

    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from('LICENSE') {
        rename { String fileName ->
            return "${fileName}_${project.base.archivesName.get()}"
        }
    }
}
