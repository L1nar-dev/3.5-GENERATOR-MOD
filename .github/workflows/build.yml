name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'
          cache-disabled: true

      - name: Fix Line Endings and Permissions
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Clean and Rebuild Environment
        run: |
          ./gradlew clean
          ./gradlew genSources --stacktrace
          ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: frostpunk-generator-mod
          path: build/libs/*.jar
          if-no-files-found: error
