name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'
          cache-disabled: true # Сносим битый кэш GitHub, собираем «на чистую»

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Clean and Rebuild Environment
        run: |
          ./gradlew clean
          ./gradlew genSources --stacktrace
          ./gradlew build

