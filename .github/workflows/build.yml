name: Build Mod
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle (Force Version 8.8)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'
          
      - name: Pre-download Minecraft and Build
        run: |
          gradle vscode --no-daemon
          gradle downloadAssets --no-daemon
          gradle build --no-daemon
